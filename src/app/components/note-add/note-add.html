<h2>Добавить заметку</h2>

<form #noteForm="ngForm" (ngSubmit)="addNote(noteForm)"> <!-- Форма проверяется через ngForm и обрабывает через событие ngSubmit (при отправке данных из этой формы - будет вызывать функция addNote - функцию же будем передавать в noteForm) -->
    <div>
        <label>Заголовок</label><br>
        <input type="text" name="title" [(ngModel)]="newNote().title" required minlength="3" maxlength="50" #titleRef="ngModel" placeholder="Заголовок"><br>
        <div *ngIf="submitted && titleRef.invalid" style="color: red;">
        <small *ngIf="titleRef.errors?.['required']">Заголовок обязателен</small>
        <small *ngIf="titleRef.errors?.['minlength']">Заголовок минимум 3 символа</small>
        <small *ngIf="titleRef.errors?.['maxlength']">Заголовок максимум 50 символов</small>
        </div>
    </div>

    <div>
        <label>Содержимое</label><br>
        <textarea name="content" [(ngModel)]="newNote().content" placeholder="Текст" required minlength="5" #contentRef="ngModel"></textarea><br>
        <div *ngIf="submitted && contentRef.invalid" style="color: red;">
        <small *ngIf="contentRef.errors?.['required']">Содержимое обязательно</small>
        <small *ngIf="contentRef.errors?.['minlength']">Содержимое минимум 5 символа</small>
        </div>
    </div>
    <button type="submit">Добавить</button>
</form>
